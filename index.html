<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB DEV GUIDE</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <style>
      /* 추가적인 일관성 디자인 */
      .hero-section {
        background: #f8f9fa;
        padding: 60px 0;
        border-bottom: 1px solid #dee2e6;
      }
      .feature-card {
        transition: transform 0.3s;
      }
      .feature-card:hover {
        transform: translateY(-5px);
      }
      footer {
        background: #343a40;
        color: white;
        padding: 30px 0;
        margin-top: 50px;
      }

      [data-bs-theme='dark'] {
        background-color: #121212 !important;
        color: #e0e0e0 !important;
      }
      [data-bs-theme='dark'] body {
        background-color: #121212 !important;
      }
      [data-bs-theme='dark'] .navbar.bg-dark,
      [data-bs-theme='dark'] footer.bg-dark {
        background-color: #000 !important;
        border-bottom: 1px solid #333;
      }
      [data-bs-theme='dark'] .card {
        background-color: #1e1e1e !important;
        color: #f8f9fa !important;
        border: 1px solid #333 !important;
      }
      [data-bs-theme='dark'] .text-muted {
        color: #a0a0a0 !important;
      }
      [data-bs-theme='dark'] .text-secondary {
        color: #bcbcbc !important;
      }
      [data-bs-theme='dark'] .text-dark {
        color: #ffffff !important;
      }
      [data-bs-theme='dark'] .bg-light {
        background-color: #2c2c2c !important;
      }

      /* --- [추가] 다크모드 디테일 보정 --- */

      /* 1. index.html: 메인 하얀 박스 (hero-section) */
      [data-bs-theme='dark'] .hero-section {
        background-color: #1e1e1e !important;
        border-bottom: 1px solid #333 !important;
      }

      /* 2. step1.html: 아코디언 탭 및 하얀 배경 보정 */
      [data-bs-theme='dark'] .bg-white {
        background-color: #1e1e1e !important;
      }
      [data-bs-theme='dark'] .accordion-item {
        background-color: #1e1e1e !important;
        border-color: #333 !important;
      }
      [data-bs-theme='dark'] .accordion-button {
        background-color: #1e1e1e !important;
        color: #ffffff !important;
      }
      /* 아코디언이 열려있을 때의 색상 */
      [data-bs-theme='dark'] .accordion-button:not(.collapsed) {
        background-color: #2c2c2c !important;
        color: #ffffff !important;
      }
      /* 아코디언 우측 화살표 아이콘 하얗게 반전 */
      [data-bs-theme='dark'] .accordion-button::after {
        filter: invert(1);
      }

      /* 3. about.html: 하단 버튼 색상 보정 */
      [data-bs-theme='dark'] .btn-dark {
        background-color: #2c2c2c !important;
        border-color: #444 !important;
      }
      [data-bs-theme='dark'] .btn-outline-dark {
        color: #e0e0e0 !important;
        border-color: #e0e0e0 !important;
      }
      [data-bs-theme='dark'] .btn-outline-dark:hover {
        background-color: #e0e0e0 !important;
        color: #121212 !important;
      }
    </style>
  </head>
  <body class="d-flex flex-column min-vh-100">

        <button

        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse py-1" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link px-3" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-3" href="step1.html">Step 1 (HTML)</a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-3" href="step2.html">Step 2 (CSS)</a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-3" href="step3.html">Step 3 (JS)</a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link px-3"
                href="https://psj-project-nextjs.vercel.app/"
              >
                Step 4 (Next.js)
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link px-3" href="about.html">About</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5 pt-5 flex-grow-1">
      <div class="row align-items-center hero-section mb-5">
        <div class="col-md-6">
          <h1 class="display-4 fw-bold text-center">웹프로그래밍 학습</h1>
          <h1 class="display-4 fw-bold text-center">가이드 웹사이트</h1>
          <p class="lead mx-5 text-center">
            정보보호학과 전공자들을 위한 프런트엔드 학습 로드맵
          </p>
        </div>
        <div class="col-md-6">
          <img
            src="img/home-image.webp"
            class="img-fluid rounded shadow h-100 img-fluid"
            alt="Main Image"
          />
        </div>
      </div>
    </div>

    <footer class="bg-dark text-white text-center py-6 mt-auto">
      © 2026 Web Programming Portfolio. No personal info included.
    </footer>

    <div class="position-fixed bottom-0 end-0 p-4" style="z-index: 1050">
      <button
        id="darkModeToggle"
        class="btn btn-dark rounded-circle shadow mb-2 d-flex justify-content-center align-items-center"
        style="width: 50px; height: 50px"
      >
        <i class="bi bi-moon-fill fs-5"></i>
      </button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
